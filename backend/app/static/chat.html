<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AbhiMart Support Agent</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
      }
      #messages {
        border: 1px solid #ddd;
        height: 400px;
        overflow-y: auto;
        padding: 16px;
        margin-bottom: 16px;
        border-radius: 8px;
      }
      .user {
        color: #1a56db;
        margin: 8px 0;
      }
      .agent {
        color: #111;
        margin: 8px 0;
      }
      #input-row {
        display: flex;
        gap: 8px;
      }
      #message-input {
        flex: 1;
        padding: 8px;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      button {
        padding: 8px 20px;
        background: #1a56db;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
      }
      button:disabled {
        background: #aaa;
      }
    </style>
  </head>
  <body>
    <h2>AbhiMart Support Agent</h2>
    <div id="messages"></div>
    <div id="input-row">
      <input id="message-input" type="text" placeholder="Ask something..." />
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
      async function sendMessage() {
        const input = document.getElementById("message-input");
        const messages = document.getElementById("messages");
        const btn = document.getElementById("send-btn");

        const message = input.value.trim();
        if (!message) return;

        // Show user message
        messages.innerHTML += `<div class="user"><strong>You:</strong> ${message}</div>`;
        input.value = "";
        btn.disabled = true;

        // Create agent message container for streaming
        const agentDiv = document.createElement("div");
        agentDiv.className = "agent";
        agentDiv.innerHTML = "<strong>Agent:</strong> ";
        messages.appendChild(agentDiv);

        // Call the SSE endpoint
        const response = await fetch("http://localhost:8000/v1/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        // Read chunks as they arrive
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split("\n");

          for (const line of lines) {
            if (line.startsWith("data: ")) {
              const data = line.slice(6);
              if (data === "[DONE]") break;
              try {
                const parsed = JSON.parse(data);
                agentDiv.innerHTML += parsed.text;
                messages.scrollTop = messages.scrollHeight;
              } catch {}
            }
          }
        }

        btn.disabled = false;
        input.focus();
      }

      // Send on Enter key
      document
        .getElementById("message-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") sendMessage();
        });
    </script>
  </body>
</html>
